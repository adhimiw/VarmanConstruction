services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: varman-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=u244089748_varman
      - DB_USERNAME=u244089748_varman
      - DB_PASSWORD=Varman@2026!DB#Secure91
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp.hostinger.com
      - MAIL_PORT=465
      - MAIL_USERNAME=info@varmanconstructions.in
      - MAIL_PASSWORD=Manjupriya@2026
      - MAIL_SCHEME=smtps
      - MAIL_FROM_ADDRESS=info@varmanconstructions.in
      - MAIL_FROM_NAME=VARMAN CONSTRUCTIONS
    command: sh -c "composer install --no-interaction && php artisan key:generate --force && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - varman-net

  frontend:
    image: node:20-alpine
    container_name: varman-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - varman-net

  mysql:
    image: mysql:8.0
    container_name: varman-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: u244089748_varman
      MYSQL_USER: u244089748_varman
      MYSQL_PASSWORD: "Varman@2026!DB#Secure91"
      MYSQL_ROOT_PASSWORD: "Varman@2026!DB#Secure91"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - varman-net

volumes:
  mysql-data:
  frontend_node_modules:

networks:
  varman-net:
    driver: bridge
